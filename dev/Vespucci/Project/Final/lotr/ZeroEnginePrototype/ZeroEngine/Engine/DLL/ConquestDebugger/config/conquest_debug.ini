; ============================================================================
; ConquestDebugger Configuration
; For: The Lord of the Rings: Conquest
; ============================================================================

[General]
; Minimum log level: Trace, Debug, Info, Warning, Error, Critical
LogLevel=Debug

; Show console window (1=yes, 0=no)
ShowConsole=1

; Console window size
ConsoleWidth=120
ConsoleHeight=40

[ThreadMonitor]
; Enable thread monitoring (1=yes, 0=no)
Enabled=1

; Freeze detection timeout in milliseconds
FreezeTimeout=2000

; Number of EIP samples to take when freeze detected
EIPSamples=10

; Interval between EIP samples (ms)
EIPSampleInterval=50

[MemoryWatcher]
; Enable memory watching (1=yes, 0=no)
Enabled=1

; Poll interval in milliseconds
PollInterval=100

[CrashHandler]
; Enable crash handler (1=yes, 0=no)
Enabled=1

; Generate minidump on crash (1=yes, 0=no)
GenerateMinidump=1

; Keep console open after crash for N seconds (0=forever until keypress)
KeepConsoleOpen=60

[Addresses]
; Game-specific memory addresses (hexadecimal)
; These are auto-detected but can be overridden here

; Event Pool
;EventPoolBase=0x00cd9970
;EventPoolFreeList=0x00cd996c
;EventPoolCount=0x00cd9974
;EventPoolLimit=4096

; Pool2
;Pool2Count=0x00cd7e28
;Pool2Limit=256

[Watches]
; Custom memory watches
; Format: Name=Address,Size,Type
; Type: Value, ReadWrite, Write, Execute
;
; Example:
; MyCounter=0x00AABBCC,4,Value

